<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcadIA - Painel</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="pedrosa.css">
</head>
<body>

    <div class="card_cima">
        
            <img class="imagem_vortexx"src="/assistente_IA/assistente-academi/imagens/logo_transparente (1).svg" alt="logo do vortex"> 
            <h1 class="nome_logo">Vortex AI</h1>
    </div>

    <div class="conteudo">
        <div class="card_lado">
            <nav class="menu-lateral">
                <ul>
                    <li class="item-menu">
                        <a href="/assistente_IA/assistente-academi/marcos/marcos.html">
                            <span class="icon"><i class="bi bi-robot"></i></span>
                            <span class="txt-link">Assistente IA</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="/assistente_IA/assistente-academi/felipe/felipe.html">
                            <span class="icon"><i class="bi bi-bullseye"></i></span>
                            <span class="txt-link">Modo Foco</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="/assistente_IA/assistente-academi/joao gabriel/templates/index.html">
                            <span class="icon"><i class="bi bi-book-half"></i></span>
                            <span class="txt-link">Tarefas</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="/assistente_IA/assistente-academi/caio/caio.html">
                            <span class="icon"><i class="bi bi-person-circle"></i></span>
                            <span class="txt-link">Perfil</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="pedrosa.html">
                            <span class="icon"><i class="bi bi-gear-fill"></i></span>
                            <span class="txt-link">Ajustes</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="area_principal">
        

            <main class="main-content">
                <section class="panel settings-panel">
                    <h2>Configurações de Conta</h2>
                    <p class="subtitle">Edite suas informações e preferências.</p>

                    <form class="form-settings">
                        <div class="field">
                            <label for="idioma">Idioma do Sistema</label>
                            <select id="idioma" class="select-field">
                                <option value="pt">Português (BR)</option>
                                <option value="en">English (US)</option>
                                <option value="es">Español</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="nome">Nome Completo</label>
                            <input id="nome" type="text" placeholder="Aluno">
                        </div>

                        <div class="field">
                            <label for="email">E-mail</label>
                            <input id="email" type="email" placeholder="Aluno@gmail.com">
                        </div>

                        <div class="field">
                            <label for="senha">Senha</label>
                            <input id="senha" type="password" placeholder="Nova senha">
                        </div>

                        <button type="submit" class="btn-primary">Salvar</button>
                    </form>
                </section>

                <section class="panel support-panel">
                    <h2>Suporte</h2>
                    <p class="subtitle">Precisa de ajuda? Fale com o suporte.</p>

                   
                        
                        <button class="btn-secondary">Contato</button>
                   
                </section>
            </main>
        </div>
    </div>

</body>
</html>
