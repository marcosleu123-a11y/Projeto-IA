<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - Vortex</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='simulado.css') }}">
    <script src="{{ url_for('static', filename='tema.js') }}"></script>
    <script src="{{ url_for('static', filename='simulado.js') }}" defer></script>
</head>
<body>
    <div class="card_cima">
        <img class="imagem_vortexx" src="{{ url_for('static', filename='imagens/logo_transparente (1).svg') }}" alt="logo do vortex">
        <h1 class="nome_logo">Vortex AI</h1>
        <img class="imagem-perfil" src="{{ foto_perfil_url }}" alt="Foto do perfil" onclick="window.location.href='{{ url_for('perfil') }}'">
    </div>

    <div class="conteudo">
        <div class="card_lado">
            <nav class="menu-lateral">
                <ul>
                    <li class="item-menu">
                        <a href="{{ url_for('assistente_academica') }}">
                            <span class="icon"><i class="bi bi-robot"></i></span>
                            <span class="txt-link">Assistente IA</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('modo_foco') }}">
                            <span class="icon"><i class="bi bi-bullseye"></i></span>
                            <span class="txt-link">Modo Foco</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('tarefas') }}">
                            <span class="icon"><i class="bi bi-book-half"></i></span>
                            <span class="txt-link">Tarefas</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('flashcards') }}" class="btn-flashcard">
                            <span class="icon"><i class="bi bi-card-text"></i></span>
                            <span class="txt-link">Flashcard</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('simulado') }}" class="btn-simulado ativo">
                            <span class="icon"><i class="bi bi-journal-text"></i></span>
                            <span class="txt-link">Simulado</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('vark') }}" class="btn-VARK">
                            <span class="icon"><i class="bi bi-palette"></i></span>
                            <span class="txt-link">VARK</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('calendario') }}" class="btn-calendario">
                            <span class="icon"><i class="bi bi-calendar-event"></i></span>
                            <span class="txt-link">Calendario</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('perfil') }}">
                            <span class="icon"><i class="bi bi-person-circle"></i></span>
                            <span class="txt-link">Perfil</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('ajustes') }}">
                            <span class="icon"><i class="bi bi-gear-fill"></i></span>
                            <span class="txt-link">Ajustes</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('logout') }}" class="btn-sair">
                            <span class="icon"><i class="bi bi-box-arrow-left"></i></span>
                            <span class="txt-link">Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="area_principal">
            <main class="main-content simulado-content">
                <section class="panel simulado-panel" id="setup-screen">
                    <h2>Simulado</h2>
                    <p class="subtitle">Monte questoes com IA e acompanhe seu desempenho.</p>

                    <div class="setup-container">
                        <div class="input-group">
                            <label for="quiz-topic">Tema</label>
                            <input type="text" id="quiz-topic" placeholder="Ex: Revolucao Francesa" autocomplete="off">
                        </div>

                        <div class="input-group">
                            <label for="num-questions">Quantidade de questoes</label>
                            <input type="number" id="num-questions" min="1" max="10" value="5">
                        </div>
                    </div>

                    <p class="loading-msg hidden" id="loading-msg">Gerando simulado...</p>

                    <div class="action-bar setup-action">
                        <button class="btn-orange" id="start-btn" type="button">
                            <span>Gerar simulado</span>
                            <i class="bi bi-stars"></i>
                        </button>
                    </div>
                </section>

                <section class="panel simulado-panel hidden" id="quiz-screen">
                    <div class="quiz-header">
                        <p class="highlight-text" id="quiz-topic-display"></p>
                        <div class="timer-container">
                            <i class="bi bi-stopwatch"></i>
                            <span id="timer-display">00:00</span>
                        </div>
                    </div>

                    <p class="question-counter" id="question-counter"></p>
                    <h2 id="question-text"></h2>

                    <div class="options-container" id="options-container"></div>

                    <div class="action-bar">
                        <button class="btn-orange" id="next-btn" type="button">
                            <span>Proxima</span>
                            <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>
                </section>

                <section class="panel simulado-panel hidden" id="result-screen">
                    <h2>Resultado</h2>
                    <p class="subtitle" id="result-summary"></p>

                    <div class="review-list" id="review-container"></div>

                    <div class="action-bar">
                        <button class="btn-orange" id="restart-btn" type="button">
                            <span>Novo simulado</span>
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>
                    </div>
                </section>
            </main>
        </div>
    </div>
    {% include "_notion_widget.html" %}
</body>
</html>
