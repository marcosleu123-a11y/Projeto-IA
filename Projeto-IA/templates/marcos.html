<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='marcos.css') }}?v=8">
</head>
<body>
    <div class="quadrado"></div>

    <div class="card_cima">
        <img class="imagem_vortexx" src="{{ url_for('static', filename='imagens/logo_transparente (1).svg') }}" alt="logo do vortex">
        <h1 class="nome_logo">Vortex AI</h1>
        <img class="imagem-perfil" src="{{ foto_perfil_url }}" alt="Foto do perfil" onclick="window.location.href='{{ url_for('perfil') }}'">
    </div>

    <div class="conteudo">
        <div class="card_lado">
            <nav class="menu-lateral">
                <ul>
                    <li class="item-menu">
                        <a href="{{ url_for('assistente_academica') }}" class="ativo">
                            <span class="icon"><i class="bi bi-robot"></i></span>
                            <span class="txt-link">Assistente IA</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('flashcards') }}" class="btn-flashcard">
                            <span class="icon"><i class="bi bi-card-text"></i></span>
                            <span class="txt-link">Flashcard</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('simulado') }}" class="btn-simulado">
                            <span class="icon"><i class="bi bi-journal-text"></i></span>
                            <span class="txt-link">Simulado</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('calendario') }}" class="btn-calendario">
                            <span class="icon"><i class="bi bi-calendar-event"></i></span>
                            <span class="txt-link">Calendário</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('perfil') }}">
                            <span class="icon"><i class="bi bi-person-circle"></i></span>
                            <span class="txt-link">Perfil</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('ajustes') }}">
                            <span class="icon"><i class="bi bi-gear-fill"></i></span>
                            <span class="txt-link">Ajustes</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('logout') }}" class="btn-sair">
                            <span class="icon"><i class="bi bi-box-arrow-left"></i></span>
                            <span class="txt-link">Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="area_principal">
            <div class="card_chat">
                <iframe src="{{ url_for('static', filename='imagens/logo_assistente_animada (2).html') }}" class="animacao-fundo"></iframe>
                <div class="chat-topo">
                    <div class="chat-menu-area">
                        <button class="botao-historicos" id="botaoHistoricos" type="button" aria-expanded="false">
                            <i class="bi bi-chat-left-text"></i>
                            Chats
                        </button>
                        <div class="painel-historicos" id="painelHistoricos" hidden>
                            <div class="painel-historicos-topo">
                                <span>Historicos</span>
                                <button class="novo-chat" id="botaoNovoChat" type="button">
                                    <i class="bi bi-plus-lg"></i>
                                    Novo chat
                                </button>
                            </div>
                            <div class="lista-historicos" id="listaHistoricos"></div>
                        </div>
                    </div>
                    <button class="limpar-historico" id="botaoLimparHistorico" type="button">
                        <i class="bi bi-trash"></i>
                        Limpar chat
                    </button>
                </div>
                <div class="mensagens" id="chatMensagens"></div>
                <div class="modal-limpar-chat" id="modalLimparChat" hidden>
                    <div class="modal-limpar-caixa" role="dialog" aria-modal="true" aria-labelledby="tituloModalLimpar">
                        <div class="modal-limpar-icone">
                            <i class="bi bi-trash"></i>
                        </div>
                        <h2 id="tituloModalLimpar">Limpar este chat?</h2>
                        <p>As mensagens desta conversa serao apagadas, mas os outros chats continuam salvos.</p>
                        <div class="modal-limpar-acoes">
                            <button class="modal-cancelar" id="botaoCancelarLimpeza" type="button">Cancelar</button>
                            <button class="modal-confirmar" id="botaoConfirmarLimpeza" type="button">
                                <i class="bi bi-check2"></i>
                                Limpar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card_pergunta">
                <section class="campo_input">
                    <input type="text" id="inputMensagem" placeholder="Digite sua pergunta...">
                </section>

                <button class="enviar" id="botaoEnviar" type="button">
                    <img class="aviao" src="{{ url_for('static', filename='imagens/Telegram App (1).png') }}" alt="aviao_imagem">
                    <span class="enviar_texto">Enviar</span>
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='marcos.js') }}?v=9"></script>
    {% include "_notion_widget.html" %}
</body>
</html>
