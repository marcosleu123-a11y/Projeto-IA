<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Vortex</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='calendario.css') }}">
    <script src="{{ url_for('static', filename='tema.js') }}"></script>
    <script src="{{ url_for('static', filename='calendario.js') }}" defer></script>
</head>
<body>
    <div class="card_cima">
        <img class="imagem_vortexx" src="{{ url_for('static', filename='imagens/logo_transparente (1).svg') }}" alt="logo do vortex">
        <h1 class="nome_logo">Vortex AI</h1>
        <img class="imagem-perfil" src="{{ foto_perfil_url }}" alt="Foto do perfil" onclick="window.location.href='{{ url_for('perfil') }}'">
    </div>

    <div class="conteudo">
        <div class="card_lado">
            <nav class="menu-lateral">
                <ul>
                    <li class="item-menu">
                        <a href="{{ url_for('assistente_academica') }}">
                            <span class="icon"><i class="bi bi-robot"></i></span>
                            <span class="txt-link">Assistente IA</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('modo_foco') }}">
                            <span class="icon"><i class="bi bi-bullseye"></i></span>
                            <span class="txt-link">Modo Foco</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('tarefas') }}">
                            <span class="icon"><i class="bi bi-book-half"></i></span>
                            <span class="txt-link">Tarefas</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('flashcards') }}" class="btn-flashcard">
                            <span class="icon"><i class="bi bi-card-text"></i></span>
                            <span class="txt-link">Flashcard</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('simulado') }}" class="btn-simulado">
                            <span class="icon"><i class="bi bi-journal-text"></i></span>
                            <span class="txt-link">Simulado</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('vark') }}" class="btn-VARK">
                            <span class="icon"><i class="bi bi-palette"></i></span>
                            <span class="txt-link">VARK</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('calendario') }}" class="btn-calendario ativo">
                            <span class="icon"><i class="bi bi-calendar-event"></i></span>
                            <span class="txt-link">Calendario</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('perfil') }}">
                            <span class="icon"><i class="bi bi-person-circle"></i></span>
                            <span class="txt-link">Perfil</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('ajustes') }}">
                            <span class="icon"><i class="bi bi-gear-fill"></i></span>
                            <span class="txt-link">Ajustes</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('logout') }}" class="btn-sair">
                            <span class="icon"><i class="bi bi-box-arrow-left"></i></span>
                            <span class="txt-link">Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="area_principal">
            <main class="main-content calendario-content">
                <section class="panel calendario-panel">
                    <div class="calendario-header">
                        <div>
                            <h2>Calendario</h2>
                            <p class="subtitle">Acompanhe os dias do mes e organize seus estudos.</p>
                        </div>

                        <button class="btn-hoje" id="todayBtn" type="button">
                            <i class="bi bi-calendar-check"></i>
                            <span>Hoje</span>
                        </button>
                    </div>

                    <div class="calendar">
                        <div class="titulo">
                            <button class="calendar-nav" id="prevMonth" type="button" aria-label="Mes anterior">
                                <i class="bi bi-chevron-left"></i>
                            </button>

                            <h3 id="monthYear"></h3>

                            <button class="calendar-nav" id="nextMonth" type="button" aria-label="Proximo mes">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>

                        <div class="dias">
                            <div>Dom</div>
                            <div>Seg</div>
                            <div>Ter</div>
                            <div>Qua</div>
                            <div>Qui</div>
                            <div>Sex</div>
                            <div>Sab</div>
                        </div>

                        <div class="datas" id="datas"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    {% include "_notion_widget.html" %}
</body>
</html>
