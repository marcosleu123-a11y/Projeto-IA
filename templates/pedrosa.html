<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcadIA - Painel</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{url_for('static', filename='pedrosa.css') }}">
    <script src="{{url_for('static', filename='tema.js') }}"></script>
</head>
<body>

    <div class="card_cima">
        
            <img class="imagem_vortexx"src="{{ url_for('static', filename='imagens/logo_transparente (1).svg') }}" alt="logo do vortex"> 
            <h1 class="nome_logo">Vortex AI</h1>
    </div>

    <div class="conteudo">
        <div class="card_lado">
            <nav class="menu-lateral">
                <ul>
                    <li class="item-menu">
                        <a href="{{ url_for('assistente_academica') }}">
                            <span class="icon"><i class="bi bi-robot"></i></span>
                            <span class="txt-link">Assistente IA</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('modo_foco') }}">
                            <span class="icon"><i class="bi bi-bullseye"></i></span>
                            <span class="txt-link">Modo Foco</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('tarefas') }}">
                            <span class="icon"><i class="bi bi-book-half"></i></span>
                            <span class="txt-link">Tarefas</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('perfil') }}">
                            <span class="icon"><i class="bi bi-person-circle"></i></span>
                            <span class="txt-link">Perfil</span>
                        </a>
                    </li>

                    <li class="item-menu">
                        <a href="{{ url_for('ajustes') }}">
                            <span class="icon"><i class="bi bi-gear-fill"></i></span>
                            <span class="txt-link">Ajustes</span>
                        </a>
                    </li>
                    <li class="item-menu">
                        <a href="{{ url_for('login') }}" class="btn-sair">
                            <span class="icon"><i class="bi bi-box-arrow-left"></i></span>
                            <span class="txt-link">Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="area_principal">
        

            <main class="main-content">
                <section class="panel settings-panel">
                    <h2>Configurações de Conta</h2>
                    <p class="subtitle">Edite suas informações e preferências.</p>

                    {% if mensagem %}
                        <p style="color: #28a745; font-weight: bold; margin-bottom: 15px;">{{ mensagem }}</p>
                    {% endif %}

                    <form class="settings-form" method="POST">
                        <div class="field">
                            <label for="idioma">Idioma do Sistema</label>
                            <select id="idioma" class="select-field">
                                <option value="pt">Português (BR)</option>
                                <option value="en">English (US)</option>
                                <option value="es">Español (ES)</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="tema">Tema</label>
                            <select id="tema" class="select-field">
                                <option value="escuro">Escuro</option>
                                <option value="claro">Claro</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="nome">Nome Completo</label>
                            <input type="text" name="nome" id="username" value="{{ usuario.nome }}" placeholder="Aluno" class="input-field">
                        </div>

                        <div class="field">
                            <label for="email">E-mail</label>
                            <input type="email" name="email" id="email" value="{{ usuario.email }}" placeholder="Aluno@gmail.com" class="input-field">                        </div>

                        <div class="field">
                            <label for="senha">Senha</label>
                            <input name="senha" id="senha" type="password" placeholder="Nova senha" class="input-field">
                        </div>

                        <button type="submit" class="btn-primary">Salvar</button>
                    </form>
                </section>

                <section class="panel support-panel">
                    <h2>Suporte</h2>
                    <p class="subtitle">Precisa de ajuda? Fale com o suporte.</p>

                   
                        
                        <button class="btn-secondary">Contato</button>
                   
                </section>
            </main>
        </div>
    </div>

</body>
</html>
