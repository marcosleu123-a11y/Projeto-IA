<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcadIA - Perfil</title>
    <link rel="stylesheet" href="caiostyles.css">
</head>
<body>

    <header class="header">
        <div class="header-brand">
            <h1>AcadIA</h1>
            <p>Streak em alta!</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-streak">🔥 20 dias</button>
            <button class="btn">🛡️ Ajuda</button>
            <button class="btn">Sair</button>
        </div>
    </header>

    <main class="main-content">
        
        <section class="panel profile-panel">
            <h2>Perfil</h2>
            <p class="subtitle">Identidade do jogador.</p>
            
            <div class="user-card">
                <div class="user-photo">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=demo" alt="Foto de perfil">
                </div>
                <div class="user-info">
                    <h3>demo</h3>
                    <p>Matricula: demo@demo.com</p>
                </div>
            </div>
        </section>

        <section class="panel upload-panel">
            <h2>Upload de foto</h2>
            <p class="subtitle">Apenas preview local para demo.</p>
            
            <div class="upload-container">
                <input type="file" id="foto" accept="image/*" class="file-input">
                <label for="foto" class="btn-upload">Selecionar foto</label>
            </div>
        </section>

    </main>

</body>
</html>
